<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg-h" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0b1e30"/>
    </radialGradient>
    <radialGradient id="glow-h" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffe88a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffe88a" stop-opacity="0"/>
    </radialGradient>
    <filter id="drop-h" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background disc -->
  <circle cx="32" cy="32" r="30" fill="url(#bg-h)"/>
  <circle cx="32" cy="32" r="29.5" fill="none" stroke="#4a90c8" stroke-width="1" opacity="0.5"/>

  <!-- Water -->
  <ellipse cx="32" cy="52" rx="22" ry="5" fill="#1c5080" opacity="0.7"/>
  <!-- Wave shapes (filled only, no stroke) -->
  <path d="M10 50 Q18 46 26 50 Q34 54 42 50 Q50 46 56 50 L56 55 L10 55 Z" fill="#1e6090" opacity="0.6"/>

  <!-- Lighthouse tower (tapered rectangle using polygon) -->
  <polygon points="25,46 27,22 37,22 39,46" fill="#c8b478" filter="url(#drop-h)"/>

  <!-- Red stripe bands -->
  <polygon points="25.4,43 38.6,43 38.2,40 25.8,40" fill="#c03030" opacity="0.85"/>
  <polygon points="26.6,34 37.4,34 37,31 27,31" fill="#c03030" opacity="0.85"/>

  <!-- Light chamber box -->
  <rect x="24" y="16" width="16" height="8" rx="1.5" fill="#7a6840" filter="url(#drop-h)"/>
  <!-- Glass window glow -->
  <rect x="25.5" y="17.5" width="13" height="5" rx="1" fill="#ffe88a" opacity="0.9"/>

  <!-- Beacon glow blob -->
  <ellipse cx="32" cy="21" rx="7" ry="5" fill="url(#glow-h)" opacity="0.6"/>

  <!-- Light rays (filled triangles, no stroke) -->
  <polygon points="32,13 31,8 33,8" fill="#ffe88a" opacity="0.55"/>
  <polygon points="39,16 44,12 45,15" fill="#ffe88a" opacity="0.4"/>
  <polygon points="25,16 20,12 19,15" fill="#ffe88a" opacity="0.4"/>

  <!-- Roof cap -->
  <polygon points="24,16 32,10 40,16" fill="#4a3a1a"/>

  <!-- Lighthouse base plinth -->
  <rect x="23" y="46" width="18" height="4" rx="1" fill="#9a8a60"/>
</svg>
