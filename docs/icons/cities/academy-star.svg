<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
  <!-- Outer ring -->
  <circle cx="24" cy="24" r="22" fill="#0D1526" stroke="#DDD6FE" stroke-width="2.5" filter="url(#shadow)"/>
  <!-- Inner background -->
  <circle cx="24" cy="24" r="18" fill="#4C1D95" opacity="0.25"/>
  <!-- Icon shape -->
  <path d="M24 10l3 7 7.5 1-5.5 5.3 1.3 7.7-6.8-3.6-6.8 3.6 1.3-7.7L12.5 18l7.5-1 4-7z" fill="#DDD6FE" filter="url(#glow)"/>
</svg>