<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg-sp" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </radialGradient>
    <radialGradient id="tower-sp" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#9a80c8"/>
      <stop offset="100%" stop-color="#5a4090"/>
    </radialGradient>
    <radialGradient id="star-sp" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#c8a8ff"/>
      <stop offset="100%" stop-color="#8040c0"/>
    </radialGradient>
    <filter id="drop-sp" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-sp" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background disc -->
  <circle cx="32" cy="32" r="30" fill="url(#bg-sp)"/>
  <circle cx="32" cy="32" r="29.5" fill="none" stroke="#8060c0" stroke-width="1" opacity="0.5"/>

  <!-- Magical aura rays behind tower (filled triangles, no stroke) -->
  <polygon points="32,10 29,20 35,20" fill="#a060e0" opacity="0.2"/>
  <polygon points="32,10 22,14 28,22" fill="#a060e0" opacity="0.15"/>
  <polygon points="32,10 42,14 36,22" fill="#a060e0" opacity="0.15"/>
  <polygon points="32,10 18,22 26,24" fill="#a060e0" opacity="0.1"/>
  <polygon points="32,10 46,22 38,24" fill="#a060e0" opacity="0.1"/>

  <!-- Tower base / foundation -->
  <rect x="22" y="48" width="20" height="5" rx="1" fill="#6a5890" filter="url(#drop-sp)"/>

  <!-- Tower lower section -->
  <rect x="24" y="36" width="16" height="14" rx="1" fill="url(#tower-sp)" filter="url(#drop-sp)"/>

  <!-- Tower middle section (slightly narrower) -->
  <rect x="26" y="26" width="12" height="12" rx="1" fill="url(#tower-sp)" filter="url(#drop-sp)"/>

  <!-- Tower upper section (narrow) -->
  <rect x="28" y="20" width="8" height="8" rx="1" fill="url(#tower-sp)" filter="url(#drop-sp)"/>

  <!-- Battlement notches on top of lower section -->
  <rect x="24" y="33" width="3" height="4" rx="0.5" fill="#7a68a0"/>
  <rect x="30" y="33" width="3" height="4" rx="0.5" fill="#7a68a0"/>
  <rect x="37" y="33" width="3" height="4" rx="0.5" fill="#7a68a0"/>

  <!-- Windows (dark filled rects with arch tops via ellipse) -->
  <rect x="29" y="41" width="6" height="7" rx="1" fill="#0d0818"/>
  <ellipse cx="32" cy="41" rx="3" ry="2" fill="#0d0818"/>
  <!-- Window glow -->
  <rect x="30" y="41" width="4" height="6" rx="0.5" fill="#9060e0" opacity="0.4"/>

  <!-- Small side windows -->
  <rect x="27" y="29" width="3" height="4" rx="0.5" fill="#0d0818"/>
  <rect x="34" y="29" width="3" height="4" rx="0.5" fill="#0d0818"/>

  <!-- Spire point -->
  <polygon points="32,8 28,20 36,20" fill="#4a3070" filter="url(#drop-sp)"/>
  <polygon points="32,8 29,16 35,16" fill="#6a50a0"/>

  <!-- Magic star at tip -->
  <circle cx="32" cy="9" r="3" fill="url(#star-sp)" filter="url(#glow-sp)"/>

  <!-- Decorative magical orb floating beside tower -->
  <circle cx="44" cy="32" r="4" fill="#c080ff" opacity="0.5" filter="url(#glow-sp)"/>
  <circle cx="20" cy="38" r="3" fill="#c080ff" opacity="0.35" filter="url(#glow-sp)"/>
</svg>
