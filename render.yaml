services:
  - type: web
    name: azterra-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # ── Supabase ──────────────────────────────────────────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # ── Auth ──────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false
      - key: COOKIE_SECRET
        sync: false
      - key: SESSION_COOKIE_NAME
        value: token
      # ── URLs ─────────────────────────────────────────────────
      # SITE_URL: Vercel frontend origin (e.g. https://your-app.vercel.app). Used for OAuth
      #   redirect_to → {SITE_URL}/auth/callback and magic-link emailRedirectTo.
      # Optional FRONTEND_CALLBACK_URL: override if the callback URL differs from SITE_URL/auth/callback.
      # API_URL: Render service URL (e.g. https://azterra-api.onrender.com).
      # OAUTH_REDIRECT_URL (optional): only if you still use legacy GET /api/auth/callback in Supabase.
      - key: SITE_URL
        sync: false
      - key: API_URL
        sync: false
      - key: FRONTEND_CALLBACK_URL
        sync: false
      - key: OAUTH_REDIRECT_URL
        sync: false
      # ── CORS ──────────────────────────────────────────────────
      # Set ALLOWED_ORIGINS to your Vercel frontend URL (comma-separated if multiple)
      - key: ALLOWED_ORIGINS
        sync: false
      - key: OAUTH_PROVIDER
        value: google
      # ── Admin ─────────────────────────────────────────────────
      - key: DEFAULT_ADMIN_EMAIL
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: DEFAULT_ADMIN_NAME
        value: Admin
