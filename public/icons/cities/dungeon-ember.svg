<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg-e" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a0e04"/>
      <stop offset="100%" stop-color="#0f0500"/>
    </radialGradient>
    <radialGradient id="fire-e" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#ff8c00"/>
      <stop offset="50%" stop-color="#d42000"/>
      <stop offset="100%" stop-color="#6a0000"/>
    </radialGradient>
    <radialGradient id="glow-e" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#ff6000" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff6000" stop-opacity="0"/>
    </radialGradient>
    <filter id="drop-e" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background disc -->
  <circle cx="32" cy="32" r="30" fill="url(#bg-e)"/>
  <circle cx="32" cy="32" r="29.5" fill="none" stroke="#c04000" stroke-width="1" opacity="0.6"/>

  <!-- Ember glow behind cave -->
  <ellipse cx="32" cy="44" rx="18" ry="10" fill="url(#glow-e)"/>

  <!-- Cave arch — outer rock shape -->
  <path d="M8 52 L8 36 Q8 16 32 16 Q56 16 56 36 L56 52 Z" fill="#2a2018" filter="url(#drop-e)"/>

  <!-- Cave opening — arch cutout painted with ember glow -->
  <ellipse cx="32" cy="40" rx="16" ry="18" fill="#1a0800"/>
  <rect x="16" y="40" width="32" height="16" fill="#1a0800"/>

  <!-- Ember glow inside the cave -->
  <ellipse cx="32" cy="48" rx="12" ry="6" fill="#c03000" opacity="0.5"/>
  <ellipse cx="32" cy="50" rx="8" ry="4" fill="#ff5000" opacity="0.4"/>

  <!-- Flame shape — main body (filled teardrop polygon) -->
  <ellipse cx="32" cy="42" rx="7" ry="10" fill="url(#fire-e)" filter="url(#drop-e)"/>

  <!-- Inner flame highlight -->
  <ellipse cx="32" cy="44" rx="4" ry="6" fill="#ffcc00" opacity="0.7"/>
  <ellipse cx="32" cy="46" rx="2" ry="3" fill="#ffffff" opacity="0.4"/>

  <!-- Flame tongue left -->
  <ellipse cx="27" cy="40" rx="3" ry="5" fill="#ff4000" opacity="0.7"/>
  <!-- Flame tongue right -->
  <ellipse cx="37" cy="40" rx="3" ry="5" fill="#ff4000" opacity="0.7"/>

  <!-- Rock texture — cave side cracks (thin filled shapes) -->
  <polygon points="10,30 12,26 13,30" fill="#1a1008" opacity="0.6"/>
  <polygon points="52,28 54,24 55,28" fill="#1a1008" opacity="0.6"/>

  <!-- Stalactites at top of arch (filled triangles) -->
  <polygon points="22,20 20,28 24,28" fill="#1e1810"/>
  <polygon points="32,18 30,27 34,27" fill="#1e1810"/>
  <polygon points="42,20 40,28 44,28" fill="#1e1810"/>

  <!-- Ground line at base -->
  <rect x="8" y="51" width="48" height="3" rx="1" fill="#201808" opacity="0.8"/>
</svg>
