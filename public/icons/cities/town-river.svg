<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg-r" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2e3a"/>
      <stop offset="100%" stop-color="#0d1e28"/>
    </radialGradient>
    <filter id="drop-r" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background disc -->
  <circle cx="32" cy="32" r="30" fill="url(#bg-r)"/>
  <circle cx="32" cy="32" r="29.5" fill="none" stroke="#5aacb8" stroke-width="1" opacity="0.5"/>

  <!-- River water (behind bridge) -->
  <rect x="8" y="34" width="48" height="14" rx="3" fill="#1a6878" opacity="0.9"/>
  <!-- River shimmer streaks -->
  <rect x="12" y="37" width="14" height="2" rx="1" fill="#4ac8d8" opacity="0.25"/>
  <rect x="36" y="40" width="12" height="2" rx="1" fill="#4ac8d8" opacity="0.2"/>

  <!-- Bridge arch body — the stone structure -->
  <!-- Left bank abutment -->
  <rect x="8" y="26" width="12" height="22" rx="2" fill="#8a7a60" filter="url(#drop-r)"/>
  <!-- Right bank abutment -->
  <rect x="44" y="26" width="12" height="22" rx="2" fill="#8a7a60" filter="url(#drop-r)"/>

  <!-- Bridge deck/road on top -->
  <rect x="8" y="26" width="48" height="8" rx="2" fill="#a09070" filter="url(#drop-r)"/>

  <!-- Arch cutout: paint river color over the stone to create arch illusion -->
  <ellipse cx="32" cy="34" rx="16" ry="10" fill="#1a6878"/>
  <!-- Restore river sheen inside arch -->
  <ellipse cx="32" cy="37" rx="12" ry="5" fill="#1a6878"/>

  <!-- Stone block texture lines on deck (filled thin rects) -->
  <rect x="18" y="27" width="1" height="6" rx="0.5" fill="#706050" opacity="0.5"/>
  <rect x="26" y="27" width="1" height="6" rx="0.5" fill="#706050" opacity="0.5"/>
  <rect x="34" y="27" width="1" height="6" rx="0.5" fill="#706050" opacity="0.5"/>
  <rect x="42" y="27" width="1" height="6" rx="0.5" fill="#706050" opacity="0.5"/>

  <!-- Parapet / railing bumps on top -->
  <rect x="10" y="22" width="4" height="5" rx="1" fill="#9a8a6a"/>
  <rect x="18" y="22" width="4" height="5" rx="1" fill="#9a8a6a"/>
  <rect x="26" y="22" width="4" height="5" rx="1" fill="#9a8a6a"/>
  <rect x="34" y="22" width="4" height="5" rx="1" fill="#9a8a6a"/>
  <rect x="42" y="22" width="4" height="5" rx="1" fill="#9a8a6a"/>
  <rect x="50" y="22" width="4" height="5" rx="1" fill="#9a8a6a"/>

  <!-- Ground / banks at bottom -->
  <rect x="8" y="48" width="12" height="6" rx="1" fill="#5a6a40" opacity="0.7"/>
  <rect x="44" y="48" width="12" height="6" rx="1" fill="#5a6a40" opacity="0.7"/>
</svg>
